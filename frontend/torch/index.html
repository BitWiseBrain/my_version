<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <title>FlashLite</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background-color: #060606; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; user-select: none; transition: background 0.3s ease; }
        
        /* Main Button */
        #torch-btn { width: 170px; height: 170px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 56px; cursor: pointer; background: #1a1a1f; border: 4px solid #25252a; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); touch-action: manipulation; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #torch-btn.on { background: #FFD700; border-color: #FFC200; box-shadow: 0 0 80px 30px rgba(255,215,0,0.3); }
        #torch-btn:active { transform: scale(0.95); }

        .label { margin-top: 24px; font-size: 24px; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
        .sub-label { margin-top: 4px; font-size: 13px; color: #444; font-weight: 600; text-transform: uppercase; }
        body.on { background-color: #fff; color: #000; }
        body.on .sub-label { color: #888; }

        /* Lumens Readout */
        .lumens { font-family: 'Courier New', monospace; font-size: 14px; margin-top: 20px; color: #333; display: none; }
        body.on .lumens { display: block; animation: flicker 0.1s infinite; }
        @keyframes flicker { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.9; } }

        /* Fake Settings */
        .settings { width: 280px; margin-top: 40px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        body.on .settings { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.05); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: #666; }
        body.on .setting-row { border-color: rgba(0,0,0,0.05); color: #333; }
        .setting-row:last-child { border: none; }

        .toggle { position: relative; width: 44px; height: 24px; background: #222; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
        .toggle.active { background: #FFD700; }
        .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: left 0.2s; }
        .toggle.active::after { left: 22px; }

        /* Screen Timeout Overlay */
        #timeout-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; }
        #timeout-overlay p { color: #222; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        /* Bottom nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: rgba(10,10,15,0.98); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a24; z-index: 99; }
        body.on .bottom-nav { background: #f5f5f5; border-top-color: #ddd; }
        .nav-item { flex: 1; text-align: center; padding: 8px; font-size: 11px; color: #444; display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
        .nav-item.active { color: #FFD700; }
        body.on .nav-item.active { color: #b8860b; }

        .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: #1a1a24; color: #888; padding: 8px 24px; border-radius: 12px; font-size: 13px; display: none; z-index: 100; border: 1px solid #2a2a34; font-weight: 600; }
        .toast.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body id="main-body">
    <div id="torch-btn" onclick="toggleTorch()">🔦</div>
    <div class="label">FlashLite</div>
    <div class="sub-label" id="subtext">Brightness: Low</div>
    
    <div class="lumens">FLUX: <span id="lumen-val">800.0</span> lm</div>

    <div class="settings">
        <div class="setting-row">
            <span>Battery Saver</span>
            <div class="toggle active" onclick="this.classList.toggle('active')"></div>
        </div>
        <div class="setting-row">
            <span>Night Mode</span>
            <div class="toggle" onclick="this.classList.toggle('active')"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><span>🔦</span>Torch</div>
        <div class="nav-item" onclick="window.location.href='/victim/home.html'"><span>🏠</span>Dashboard</div>
        <div class="nav-item" onclick="logout()"><span>🛡️</span>Exit</div>
    </div>

    <div id="timeout-overlay" onclick="resetTimeout()">
        <p>Screen Timeout</p>
    </div>

    <div id="sos-confirmation" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(185, 28, 28, 0.95); z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px;">
        <div style="font-size:80px;">🛡️</div>
        <h2 style="font-size:32px; margin-top:20px;">Help is on the way</h2>
        <h2 style="font-size:24px; opacity:0.8;">सहायता आ रही है</h2>
        <div id="sos-count" style="font-size:64px; font-weight:800; margin-top:30px;">3</div>
        <p style="margin-top:20px; font-size:14px; opacity:0.6;">Police Command Center Notified</p>
    </div>

    <div class="toast" id="toast"></div>

    <script src="torch.js"></script>
    <script>
        function logout() {
            localStorage.removeItem("ankurah_token");
            window.location.href = "/auth/login.html";
        }
        
        // Flicker lumen values for realism
        setInterval(() => {
            if(document.body.classList.contains('on')) {
                const val = (800 + (Math.random() * 20)).toFixed(1);
                document.getElementById('lumen-val').innerText = val;
            }
        }, 100);
    </script>
</body>
</html>
