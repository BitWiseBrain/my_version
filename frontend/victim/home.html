<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashLite Companion</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f0f13; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 24px; display: flex; flex-direction: column; }
        header { margin-bottom: 30px; }
        h1 { font-size: 24px; color: #fff; margin-bottom: 4px; }
        .status { color: #a855f7; font-size: 14px; font-weight: 600; }
        
        .main-button { background: linear-gradient(135deg, #1c1c2e, #111119); padding: 40px 20px; border-radius: 20px; text-align: center; border: 1px solid #2a2a3a; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 20px; cursor: pointer; transition: transform 0.2s; }
        .main-button:active { transform: scale(0.98); }
        .icon-circle { width: 80px; height: 80px; background: #1a1a24; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 1px solid #333; }
        .main-button h2 { font-size: 18px; color: #fff; font-weight: 600; }
        .main-button p { color: #555; font-size: 13px; }

        .sec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .sec-btn { background: #1a1a24; padding: 16px; border-radius: 12px; border: 1px solid #2a2a3a; text-decoration: none; color: #ccc; font-size: 14px; display: flex; align-items: center; gap: 10px; font-weight: 600; cursor: pointer; }
        
        .contacts-card { background: #1a1a24; border-radius: 16px; padding: 20px; border: 1px solid #2a2a3a; flex: 1; }
        .contacts-card h3 { font-size: 15px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; font-weight: 700; }
        .contact-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #252530; text-decoration: none; color: inherit; }
        .contact-row:last-child { border: none; }
        .c-info { display: flex; flex-direction: column; }
        .c-name { color: #fff; font-weight: 600; font-size: 15px; }
        .c-phone { color: #666; font-size: 13px; }
        .call-btn { width: 36px; height: 36px; background: #252530; color: #a855f7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        .history-link { display: block; text-align: center; color: #555; font-size: 13px; margin-top: 20px; text-decoration: underline; cursor: pointer; }

        /* Skeleton */
        .skeleton { background: #1a1a24; border-radius: 16px; height: 200px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Dialog for history */
        #history-dialog { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,15,19,0.95); z-index: 100; display: none; padding: 24px; overflow-y: auto; }
        #history-dialog.show { display: block; }
        .close-dialog { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: #888; }
        .hist-item { background: #1a1a24; padding: 16px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #2a2a3a; }
        .hist-time { font-size: 12px; color: #666; margin-bottom: 4px; }
        .hist-status { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .status-active { color: #f87171; }
        .status-resolving { color: #60a5fa; }
        .status-resolved { color: #34d399; }
    </style>
</head>
<body>
    <header>
        <h1 id="greeting">Stay safe, User 🛡️</h1>
        <div class="status">● All systems active</div>
    </header>

    <div class="main-button" onclick="window.location.href='/torch/index.html'">
        <div class="icon-circle">🔦</div>
        <h2>Open FlashLite</h2>
        <p>Simple tools for your utility kit</p>
    </div>

    <div class="sec-grid">
        <div class="sec-btn" onclick="window.location.href='/victim/home.html'">
            <span>📍</span> Safe Zones
        </div>
        <div class="sec-btn" onclick="window.location.href='/about.html'">
            <span>ℹ️</span> About Us
        </div>
    </div>

    <div class="contacts-card" id="contacts-card">
        <h3>Emergency Contacts</h3>
        <div id="contacts-list">
            <!-- Dynamic -->
        </div>
    </div>

    <div class="history-link" onclick="showHistory()">View My Distress History</div>

    <!-- History Dialog -->
    <div id="history-dialog">
        <span class="close-dialog" onclick="document.getElementById('history-dialog').classList.remove('show')">✕</span>
        <h2 style="margin-bottom:20px;">Safety Logs</h2>
        <div id="history-list"></div>
    </div>

    <script>
        const BACKEND_URL = "http://localhost:8000";
        const token = localStorage.getItem("ankurah_token");
        const phone = localStorage.getItem("ankurah_phone");

        if(!token) window.location.href = "/auth/login.html";

        async function loadProfile() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/victims/${phone}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(res.ok) {
                    const victim = await res.json();
                    document.getElementById('greeting').innerText = `Stay safe, ${victim.name.split(' ')[0]} 🛡️`;
                    renderContacts(victim.contacts);
                }
            } catch(e) { console.error(e); }
        }

        function renderContacts(contacts) {
            const list = document.getElementById('contacts-list');
            if(!contacts || contacts.length === 0) {
                list.innerHTML = `<p style="color:#555; font-size:13px; text-align:center; padding:20px;">No contacts added yet.<br><a href="/victim/home.html" style="color:#a855f7;">Go to Profile Setup</a></p>`;
                return;
            }
            list.innerHTML = contacts.map(c => `
                <a href="tel:${c.phone}" class="contact-row">
                    <div class="c-info">
                        <span class="c-name">${c.name}</span>
                        <span class="c-phone">${c.phone}</span>
                    </div>
                    <div class="call-btn">📞</div>
                </a>
            `).join('');
        }

        async function showHistory() {
            const dialog = document.getElementById('history-dialog');
            const list = document.getElementById('history-list');
            dialog.classList.add('show');
            list.innerHTML = '<p style="color:#555; text-align:center; padding:20px;">Loading logs...</p>';

            try {
                const res = await fetch(`${BACKEND_URL}/api/distress/mine`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if(data.length === 0) {
                    list.innerHTML = '<p style="color:#555; text-align:center; padding:40px;">No logs found. You haven\'t triggered any alerts yet.</p>';
                    return;
                }
                list.innerHTML = data.map(h => {
                    let statusClass = h.status === 'active' ? 'status-active' : (h.status === 'responding' ? 'status-resolving' : 'status-resolved');
                    let statusLabel = h.status === 'active' ? '⚠️ Reported' : (h.status === 'responding' ? '🚔 Police En Route' : '✅ Case Resolved');
                    return `
                        <div class="hist-item">
                            <div class="hist-time">${new Date(h.timestamp).toLocaleString()}</div>
                            <div class="hist-status ${statusClass}">${statusLabel}</div>
                        </div>
                    `;
                }).join('');
            } catch(e) {
                list.innerHTML = '<p style="color:#f87171; text-align:center;">Failed to load history.</p>';
            }
        }

        loadProfile();
    </script>
</body>
</html>
