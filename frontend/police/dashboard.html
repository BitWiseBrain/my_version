<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankurah | Command Center</title>
    <!-- Leaflet & IO via CDN -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <div class="logo-box">
            <h2>🛡️ ANKURAH</h2>
            <span style="font-size: 10px; opacity:0.5; font-weight:700; border-left: 1px solid var(--border-dark); padding-left:10px;">COMMAND CENTER</span>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Active Alerts</span>
                <span class="stat-val" id="stat-active">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Resolved Today</span>
                <span class="stat-val" id="stat-resolved">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Avg Respond</span>
                <span class="stat-val" id="stat-avg">0m</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Top Zone</span>
                <span class="stat-val" id="stat-zone">None</span>
            </div>
        </div>

        <div class="officer-info">
            <span id="officer-name">OFFICER SMITH</span>
            <span class="logout-btn" onclick="logout()">Safety Logout</span>
        </div>
    </header>

    <main>
        <!-- Sidebar -->
        <section id="alert-sidebar">
            <div class="sidebar-header">
                <div style="font-size: 13px; font-weight: 700; color: #fff;">LIVE ALERTS FEED</div>
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
                    <button class="filter-btn" onclick="setFilter('Active', this)">Active</button>
                    <button class="filter-btn" onclick="setFilter('Resolved', this)">Resolved</button>
                    <button class="filter-btn" onclick="setFilter('High Threat', this)">High Threat</button>
                </div>
            </div>

            <div id="alert-feed">
                <!-- Cards injected here -->
            </div>
        </section>

        <!-- Map -->
        <section id="map-container">
            <div id="map"></div>
            
            <div class="map-controls">
                <div class="m-btn" id="btn-heat" title="Heatmap Toggle" onclick="toggleHeatmap()">🔥</div>
                <div class="m-btn" title="Center Region" onclick="centerOnCommand()">🧭</div>
            </div>
        </section>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
